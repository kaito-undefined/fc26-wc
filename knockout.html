<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC 26 - TS Taym 2026 Dünya Kupası Eleme Aşaması</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600;700&display=swap');

        :root {
            --c-dark-red: #5e0b15;
            --c-red: #e3001b;
            --c-purple: #9b72e5;
            --c-blue: #143deb;
            --c-green: #b2eb14;
            --c-teal: #14ebd9;
            --c-yellow: #ebeb14;
            --c-gold: #ffcc00;
            --line-default: #dcdcdc;
            --line-width: 0.15vw;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background-color: var(--c-purple);
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background:
                radial-gradient(circle at 90% -10%, var(--c-yellow) 10%, var(--c-green) 10.1%, var(--c-green) 20%, var(--c-teal) 20.1%, var(--c-teal) 30%, transparent 30.1%),
                radial-gradient(circle at -10% 110%, var(--c-red) 15%, var(--c-dark-red) 15.1%, var(--c-dark-red) 30%, var(--c-purple) 30.1%, var(--c-purple) 45%, var(--c-blue) 45.1%, var(--c-blue) 60%, transparent 60.1%);
            background-color: var(--c-blue);
        }

        .wave {
            position: fixed;
            width: 200vw;
            height: 200vw;
            border-radius: 40% 60% 65% 35% / 40% 45% 55% 60%;
            animation: spin 35s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        .wave1 {
            top: -100vw;
            left: -50vw;
            border: 12vw solid var(--c-green);
            box-sizing: border-box;
        }

        .wave2 {
            top: -110vw;
            left: -60vw;
            border: 10vw solid var(--c-teal);
            box-sizing: border-box;
            animation-duration: 45s;
        }

        .wave3 {
            top: -120vw;
            left: -70vw;
            border: 8vw solid var(--c-yellow);
            box-sizing: border-box;
            animation-duration: 30s;
        }

        .wave4 {
            bottom: -100vw;
            right: -50vw;
            border: 15vw solid var(--c-red);
            box-sizing: border-box;
            border-radius: 50% 50% 30% 70% / 50% 50% 70% 30%;
            animation-duration: 25s;
            animation-direction: reverse;
        }

        .wave5 {
            bottom: -115vw;
            right: -65vw;
            border: 15vw solid var(--c-dark-red);
            box-sizing: border-box;
            border-radius: 50% 50% 30% 70% / 50% 50% 70% 30%;
            animation-duration: 32s;
            animation-direction: reverse;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .scale-container {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2vh 1vw;
            box-sizing: border-box;
        }

        .tournament-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            width: 98vw;
            height: 94vh;
        }

        .bracket-half {
            display: flex;
            width: 41vw;
            justify-content: space-between;
        }

        .bracket-half.right-side {
            flex-direction: row-reverse;
        }

        .round {
            display: flex;
            flex-direction: column;
            width: 8vw;
            height: 100%;
        }

        .center-final {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 12vw;
            height: 100%;
            position: relative;
        }

        .round-1 .match-cell {
            height: 12.5%;
        }

        .round-2 .match-cell {
            height: 25%;
        }

        .round-3 .match-cell {
            height: 50%;
        }

        .round-4 .match-cell {
            height: 100%;
        }

        .match-cell {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .match-box {
            background: rgba(20, 5, 20, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 0.5vw;
            padding: 0.4vh 0.4vw;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 5;
            box-sizing: border-box;
        }

        .team {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.3vh 0.4vw;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.70vw;
            font-weight: 600;
            border-radius: 0.3vw;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 0.5vw;
        }

        .team-info img {
            width: 1.2vw;
            height: 0.9vw;
            border-radius: 2px;
            object-fit: cover;
        }

        .team.winner {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .team.winner .score {
            color: var(--c-green);
            font-weight: 800;
        }

        .trophy-container {
            position: absolute; 
            bottom: calc(50% + 7.5vw);
        }

        .trophy-container svg {
            width: 10vw;
            height: 10vw;
            filter: drop-shadow(0 0 10px var(--c-gold));
        }

        .final-title {
            position: absolute; 
            bottom: calc(50% + 5vw);
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; 
            font-size: 1.5vw;
            color: #fff; 
            letter-spacing: 0.2vw; 
            text-align: center;
            width: 100%;
        }

        .center-final .match-box {
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%);
            width: 100%; 
            padding: 0.8vh 0.8vw; 
            margin: 0;
        }

        .center-final .team {
            font-size: 1vw;
            padding: 0.6vh 0.6vw;
        }

        .center-final .team-info img {
            width: 1.8vw;
            height: 1.3vw;
        }

        .match-box::after,
        .match-box::before,
        .match-cell::after {
            box-sizing: border-box;
        }

        .left-side .match-cell:nth-child(odd)::after {
            content: "";
            position: absolute;
            z-index: 1;
            pointer-events: none;
            right: -1.5vw;
            top: 50%;
            width: 1.5vw;
            height: 50%;
            border-top: var(--line-width) solid var(--line-default);
            border-right: var(--line-width) solid var(--line-default);
            border-top-right-radius: 0.8vw;
        }

        .left-side .match-cell:nth-child(even)::after {
            content: "";
            position: absolute;
            z-index: 1;
            pointer-events: none;
            right: -1.5vw;
            bottom: 50%;
            width: 1.5vw;
            height: 50%;
            border-bottom: var(--line-width) solid var(--line-default);
            border-right: var(--line-width) solid var(--line-default);
            border-bottom-right-radius: 0.8vw;
        }

        .left-side .round:not(.round-1) .match-box::before {
            content: "";
            position: absolute;
            z-index: 1;
            pointer-events: none;
            left: -1.5vw;
            top: calc(50% - (var(--line-width) / 2));
            width: 1.5vw;
            border-top: var(--line-width) solid var(--line-default);
        }

        .right-side .match-cell:nth-child(odd)::after {
            content: "";
            position: absolute;
            z-index: 1;
            pointer-events: none;
            left: -1.5vw;
            top: 50%;
            width: 1.5vw;
            height: 50%;
            border-top: var(--line-width) solid var(--line-default);
            border-left: var(--line-width) solid var(--line-default);
            border-top-left-radius: 0.8vw;
        }

        .right-side .match-cell:nth-child(even)::after {
            content: "";
            position: absolute;
            z-index: 1;
            pointer-events: none;
            left: -1.5vw;
            bottom: 50%;
            width: 1.5vw;
            height: 50%;
            border-bottom: var(--line-width) solid var(--line-default);
            border-left: var(--line-width) solid var(--line-default);
            border-bottom-left-radius: 0.8vw;
        }

        .right-side .round:not(.round-1) .match-box::before {
            content: "";
            position: absolute;
            z-index: 1;
            pointer-events: none;
            right: -1.5vw;
            top: calc(50% - (var(--line-width) / 2));
            width: 1.5vw;
            border-top: var(--line-width) solid var(--line-default);
        }

        .left-side .round-4 .match-cell::after {
            content: "";
            position: absolute;
            z-index: 1;
            pointer-events: none;
            right: -2vw;
            top: calc(50% - (var(--line-width) / 2));
            width: 2vw;
            height: 0;
            border: none;
            border-top: var(--line-width) solid var(--line-default);
            border-radius: 0;
        }

        .right-side .round-4 .match-cell::after {
            content: "";
            position: absolute;
            z-index: 1;
            pointer-events: none;
            left: -2vw;
            top: calc(50% - (var(--line-width) / 2));
            width: 2vw;
            height: 0;
            border: none;
            /* Kavisleri ezmek için */
            border-top: var(--line-width) solid var(--line-default);
            border-radius: 0;
        }

        .path-gold-down::after {
            border-color: var(--c-gold) !important;
        }

        .path-gold-up::after {
            border-color: var(--c-gold) !important;
        }

        .incoming-gold::before {
            border-color: var(--c-gold) !important;
        }
    </style>
</head>

    <script>
        let teams = [];
        let scores = [];

        function getWinnerOfMatch(matchIndex) {
            if (matchIndex >= 32) return null;
            let leftIdx = matchIndex >= 16 ? (matchIndex - 16) * 2 : getWinnerOfMatch(matchIndex * 2);
            let rightIdx = matchIndex >= 16 ? (matchIndex - 16) * 2 + 1 : getWinnerOfMatch(matchIndex * 2 + 1);

            const score = scores[matchIndex];
            if (!score || score[0] === null || score[1] === null || leftIdx === null || rightIdx === null) return null;
            return score[0] > score[1] ? leftIdx : rightIdx;
        }

        function getMatchSlotData(slotId) {
            let leftIdx = slotId >= 16 ? (slotId - 16) * 2 : getWinnerOfMatch(slotId * 2);
            let rightIdx = slotId >= 16 ? (slotId - 16) * 2 + 1 : getWinnerOfMatch(slotId * 2 + 1);
            const score = scores[slotId] || [null, null];

            return {
                team1: leftIdx !== null ? teams[leftIdx] : null,
                team2: rightIdx !== null ? teams[rightIdx] : null,
                score1: score[0],
                score2: score[1]
            };
        }

        function renderTeamHTML(team, score, isWinner) {
            const winnerClass = isWinner ? 'winner' : '';
            const scoreDisplay = score !== null ? score : '-';

            if (!team) {
                return `
                    <div class="team ${winnerClass}">
                        <div class="team-info"><span>TBD</span></div>
                        <span class="score">${scoreDisplay}</span>
                    </div>
                `;
            }

            return `
                <div class="team ${winnerClass}">
                    <div class="team-info">
                        <img src="https://flagcdn.com/w40/${team.flag}.png" alt="${team.name}">
                        <span>${team.name.toUpperCase()}</span>
                    </div>
                    <span class="score">${scoreDisplay}</span>
                </div>
            `;
        }

        function updateBracketDOM() {
            const matchMapping = [
                { selector: '.left-side .round-1 .match-box', indices: [16, 17, 18, 19, 20, 21, 22, 23] },
                { selector: '.left-side .round-2 .match-box', indices: [8, 9, 10, 11] },
                { selector: '.left-side .round-3 .match-box', indices: [4, 5] },
                { selector: '.left-side .round-4 .match-box', indices: [2] },
                { selector: '.right-side .round-1 .match-box', indices: [24, 25, 26, 27, 28, 29, 30, 31] },
                { selector: '.right-side .round-2 .match-box', indices: [12, 13, 14, 15] },
                { selector: '.right-side .round-3 .match-box', indices: [6, 7] },
                { selector: '.right-side .round-4 .match-box', indices: [3] },
                { selector: '.center-final .match-box', indices: [1] }
            ];

            matchMapping.forEach(group => {
                const elements = document.querySelectorAll(group.selector);

                elements.forEach((box, index) => {
                    const matchId = group.indices[index];
                    const matchData = getMatchSlotData(matchId);

                    const t1Won = matchData.score1 !== null && matchData.score2 !== null && matchData.score1 > matchData.score2;
                    const t2Won = matchData.score1 !== null && matchData.score2 !== null && matchData.score2 > matchData.score1;
                    const hasWinner = t1Won || t2Won;

                    const cell = box.parentElement;

                    if (matchId !== 1) {
                        const nextMatchId = Math.floor(matchId / 2);
                        const nextMatchData = getMatchSlotData(nextMatchId);

                        const nextT1Won = nextMatchData.score1 !== null && nextMatchData.score2 !== null && nextMatchData.score1 > nextMatchData.score2;
                        const nextT2Won = nextMatchData.score1 !== null && nextMatchData.score2 !== null && nextMatchData.score2 > nextMatchData.score1;

                        let isPathGold = false;

                        if (matchId % 2 === 0 && nextT1Won) {
                            isPathGold = true;
                        }
                        else if (matchId % 2 !== 0 && nextT2Won) {
                            isPathGold = true;
                        }

                        if (isPathGold) {
                            cell.classList.add(index % 2 === 0 ? 'path-gold-down' : 'path-gold-up');
                        }
                    }

                    if (matchId < 16 && matchId !== 1) {
                        box.classList.remove('incoming-gold');

                        if (hasWinner) {
                            box.classList.add('incoming-gold');
                        }
                    }

                    const team1HTML = renderTeamHTML(matchData.team1, matchData.score1, t1Won);
                    const team2HTML = renderTeamHTML(matchData.team2, matchData.score2, t2Won);

                    box.innerHTML = team1HTML + team2HTML;
                });
            });
        }

        fetch('knockout.json')
            .then(response => response.json())
            .then(data => {
                teams = data.teams;
                scores = data.scores;
                updateBracketDOM();
            });
    </script>
