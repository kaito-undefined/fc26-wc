<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC 26 - TS Taym 2026 Dünya Kupası</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600;700&display=swap');

        :root {
            --c-dark-red: #5e0b15;
            --c-red: #e3001b;
            --c-purple: #9b72e5;
            --c-blue: #143deb;
            --c-green: #b2eb14;
            --c-teal: #14ebd9;
            --c-yellow: #ebeb14;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background-color: var(--c-purple);
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background:
                radial-gradient(circle at 90% -10%, var(--c-yellow) 10%, var(--c-green) 10.1%, var(--c-green) 20%, var(--c-teal) 20.1%, var(--c-teal) 30%, transparent 30.1%),
                radial-gradient(circle at -10% 110%, var(--c-red) 15%, var(--c-dark-red) 15.1%, var(--c-dark-red) 30%, var(--c-purple) 30.1%, var(--c-purple) 45%, var(--c-blue) 45.1%, var(--c-blue) 60%, transparent 60.1%);
            background-color: var(--c-blue);
        }

        .wave {
            position: fixed;
            width: 200vw;
            height: 200vw;
            border-radius: 40% 60% 65% 35% / 40% 45% 55% 60%;
            animation: spin 35s linear infinite;
            z-index: 1;
        }

        .wave1 {
            top: -100vw;
            left: -50vw;
            border: 12vw solid var(--c-green);
            box-sizing: border-box;
        }

        .wave2 {
            top: -110vw;
            left: -60vw;
            border: 10vw solid var(--c-teal);
            box-sizing: border-box;
            animation-duration: 45s;
        }

        .wave3 {
            top: -120vw;
            left: -70vw;
            border: 8vw solid var(--c-yellow);
            box-sizing: border-box;
            animation-duration: 30s;
        }

        .wave4 {
            bottom: -100vw;
            right: -50vw;
            border: 15vw solid var(--c-red);
            box-sizing: border-box;
            border-radius: 50% 50% 30% 70% / 50% 50% 70% 30%;
            animation-duration: 25s;
            animation-direction: reverse;
        }

        .wave5 {
            bottom: -115vw;
            right: -65vw;
            border: 15vw solid var(--c-dark-red);
            box-sizing: border-box;
            border-radius: 50% 50% 30% 70% / 50% 50% 70% 30%;
            animation-duration: 32s;
            animation-direction: reverse;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .standings-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            background: rgba(20, 5, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 15px 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }

        .standings-wrapper .header {
            margin-bottom: 5px;
        }

        .logo-26 {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto 5px auto;
        }

        .logo-26 .num {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 80px;
            line-height: 1;
            position: absolute;
            letter-spacing: -12px;
        }

        .logo-26 .two {
            color: #fff;
            left: -10px;
            top: -5px;
            z-index: 2;
            text-shadow: -3px 3px 0px var(--c-dark-red);
        }

        .logo-26 .six {
            color: var(--c-red);
            right: -2px;
            top: 15px;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 5;
        }

        .header h2 {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--c-teal);
            margin: 0;
            text-transform: uppercase;
        }

        .header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            margin: 5px 0 0 0;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            position: relative;
            z-index: 5;
        }

        th {
            text-align: right;
            padding: 0 5px 5px 5px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 700;
            font-size: 0.85rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 6px 5px;
            font-size: 1rem;
            font-weight: 800;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.3s ease;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        .col-team {
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .col-team img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .col-o,
        .col-p,
        .col-a {
            text-align: right;
            width: 30px;
            font-family: 'Montserrat', sans-serif;
        }

        .col-p {
            color: var(--c-green);
            text-shadow: 0 0 15px rgba(178, 235, 20, 0.5);
        }

        .page-content {
            position: relative;
            z-index: 10;
            padding: 15px 20px;

            height: 100vh;

            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .groups-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 1600px;
            flex: 1;
            min-height: 0;
        }
    </style>
</head>

<body>

    <div class="background"></div>
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
    <div class="wave wave3"></div>
    <div class="wave wave4"></div>
    <div class="wave wave5"></div>

    <div class="page-content">

        <div class="main-header">
            <div class="logo-26">
                <span class="num two">2</span>
                <span class="num six">6</span>
            </div>
            <h2>TS Taym Dünya Kupası</h2>
        </div>

        <div id="groups-container" class="groups-container"></div>

    </div>

    <script>
        const container = document.getElementById("groups-container");

        function renderGroups(groupsData) {
            groupsData.forEach(group => {
                const card = document.createElement("div");
                card.className = "standings-wrapper";

                card.innerHTML = `
                <div class="header">
                    <h1>${group.groupName}</h1>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th></th>
                            <th>O</th>
                            <th>A</th>
                            <th>P</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            `;
                const tbody = card.querySelector("tbody");

                group.teams.forEach(team => {
                    const tr = document.createElement("tr");

                    tr.innerHTML = `
                    <td class="col-team">
                        <img src="https://flagcdn.com/w80/${team.flagCode}.png" alt="${team.name}">
                        ${team.name}
                    </td>
                    <td class="col-o">${team.played}</td>
                    <td class="col-a">${team.average}</td>
                    <td class="col-p">${team.points}</td>
                `;

                    tbody.appendChild(tr);
                });

                container.appendChild(card);
            });
        }

        fetch('groups.json')
            .then(res => {
                return res.json();
            }).then(data => {
                renderGroups(data);
            });
    </script>

</body>

</html>
